name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ --ignore=tests/eval_full.py --ignore=tests/test_structdata.py -q

      - name: Lint with ruff
        run: ruff check src/

      - name: Type check with mypy
        run: mypy src/euredact/ --ignore-missing-imports
        continue-on-error: true  # strict mode may have issues initially

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build wheel
        run: python -m build

      - name: Verify wheel installs
        run: |
          pip install dist/*.whl
          python -c "import euredact; print(euredact.__version__); print(len(euredact.available_countries()), 'countries')"
