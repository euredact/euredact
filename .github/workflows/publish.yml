name: Publish

on:
  release:
    types: [published]

jobs:
  publish-python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: euredact-python
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: euredact-python/dist/

  publish-ts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: euredact-ts
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
